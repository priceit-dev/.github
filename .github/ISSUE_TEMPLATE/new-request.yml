name: "\U0001F4A1 새 요청"
description: "새로 만들어야 하는 것 (페이지, 기능, 소재 등)"
labels: ["요청"]
body:
  - type: markdown
    attributes:
      value: |
        **한 가지만 작성해주세요.** 여러 개면 따로 작성해주세요.
        **개인정보(전화번호, 주소), 계약 금액 등 민감 정보는 절대 작성하지 마세요.**
  - type: textarea
    id: what
    attributes:
      label: "무엇이 필요한가요?"
      description: "만들어야 하는 것을 설명해주세요"
      placeholder: "예: 정민영 코치 상세페이지 새로 만들기"
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: "왜 필요한가요?"
      description: "배경이나 이유"
      placeholder: "예: 신규 코치 온보딩 완료, 무료강의 전 상세페이지 필요"
    validations:
      required: true
  - type: textarea
    id: reference
    attributes:
      label: "참고 자료"
      description: "참고할 기존 페이지, 이미지, 문서 등"
    validations:
      required: false
  - type: dropdown
    id: urgency
    attributes:
      label: "긴급도"
      options:
        - "\U0001F534 긴급"
        - "\U0001F7E1 이번 주"
        - "\U0001F7E2 여유"
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: "구분"
      options:
        - "\U0001F4C4 문서 (wiki, 마케팅 소재, 가이드 등)"
        - "\U0001F4BB 서비스 (웹사이트, 앱, MC 등)"
    validations:
      required: true
  - type: dropdown
    id: part
    attributes:
      label: "요청 파트"
      options:
        - "운영"
        - "마케팅"
        - "디자인"
        - "기타"
    validations:
      required: true
